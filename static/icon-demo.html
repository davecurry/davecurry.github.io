<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Projects nav icon options</title>
<link href="https://fonts.googleapis.com/css2?family=Arvo:wght@400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
<style>
* { margin: 0; box-sizing: border-box; }
body {
  font-family: "Fira Code", monospace;
  background: #132335;
  color: #cbcbcb;
  padding: 40px 24px;
}
h1 { font-family: "Arvo", serif; font-size: 1.4rem; margin-bottom: 6px; }
.hint { font-size: .8rem; color: #b3b2b2; margin-bottom: 34px; }
.row {
  display: flex;
  align-items: baseline;
  gap: 26px;
  padding: 13px 0;
  border-bottom: 1px solid #2a3a4f;
  max-width: 720px;
}
.iconname { font-size: .75rem; color: #b3b2b2; width: 170px; flex-shrink: 0; }
.navmock { font-size: .95rem; color: #cbcbcb; }
.navmock .material-symbols-outlined {
  font-size: 1rem;
  vertical-align: -0.15em;
  margin-right: 0.25em;
}
.navmock .book { color: #cbcbcb; }
.sep { color: #4a5a6f; margin: 0 14px; }
.material-symbols-outlined {
  font-family: 'Material Symbols Outlined';
  font-weight: normal;
  font-style: normal;
  display: inline-block;
  line-height: 1;
  letter-spacing: normal;
  white-space: nowrap;
  direction: ltr;
}
</style>
</head>
<body>
<h1>Projects nav icon options</h1>
<p class="hint">Each row: the icon next to "Projects," with "Reading" alongside for context. Current icon is deployed_code.</p>
<div id="rows"></div>
<script>
'use strict';
const icons = [
  'deployed_code', 'code', 'terminal', 'experiment', 'science', 'widgets',
  'apps', 'category', 'shapes', 'interests', 'extension', 'construction',
  'handyman', 'draw', 'design_services', 'palette', 'brush', 'auto_awesome',
  'rocket_launch', 'web', 'animation', 'motion_blur', 'toys', 'joystick'
];
document.getElementById('rows').innerHTML = icons.map(i => `
  <div class="row">
    <span class="iconname">${i}</span>
    <span class="navmock">
      <span class="material-symbols-outlined">${i}</span>Projects
      <span class="sep">·</span>
      <span class="material-symbols-outlined book">book</span>Reading
    </span>
  </div>`).join('');
</script>
</body>
</html>
