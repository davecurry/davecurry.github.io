# adding some space

baseURL: "https://davecurry.net/"
languageCode: en-us
title: davecurry.net
pagination:
    pagerSize: 10
theme: PaperMod

# relativeURLs: true
enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true

services:
  googleAnalytics:
    ID: G-E1BD6QPGYB

minify:
    disableXML: true
    # minifyOutput: true

taxonomies:
    category: categories
    tag: tags
    series: series

markup:
    goldmark:
        renderer:
            unsafe: true

menu:
    main:
        - name: Projects
          identifier: pages/projects
          url: pages/projects
          weight: 1
          pre: '<span class="material-symbols-outlined" style="font-size:1rem;vertical-align:-0.15em;margin-right:0.25em;">auto_awesome</span>'
        - name: Reading
          url: pages/reading
          weight: 2
          pre: '<span class="material-symbols-outlined" style="font-size:1rem;vertical-align:-0.15em;margin-right:0.25em;">book</span>'
        - name: Who Me?
          url: pages/about
          weight: 3

params:
    defaultTheme: dark
    disableThemeToggle: true
    disableScrollToTop: true
    ShowShareButtons: false
    ShowReadingTime: true
    # disableSpecial1stPost: true
    displayFullLangName: true
    ShowPostNavLinks: false
    ShowBreadCrumbs: true
    ShowCodeCopyButtons: true
    ShowRssButtonInSectionTermList: true
    ShowToc: false
    favicon: "favicon.ico"
    comments: false
    # images: ["papermod-cover.png"]
    cover:
        hiddenInList: false     # show cover in list/preview views
        hiddenInSingle: true   # show cover on the post page itself

    mainSections:
    - posts

    homeInfoParams:
        Title: "Dave Curry"
        Content: |
          ## Design Leader for [HBO Max](/hbomax.jpg) at Warner Bros. Discovery ##
          
          - 
          
          - Previously WarnerMedia, HBO, and #AgencyLife

          -

          - My exceptional team and I consistently strive to evolve and enhance the HBO Max user experience for our global customers. Product design is a never-ending journey of improvement, experimentation, and innovation.

    socialIcons: # optional
        - name: "LinkedIn"
          url: "http://linkedin.com/in/davecurry"

